<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Opalwave</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen px-6 overflow-hidden">
  
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="relative z-10 max-w-md w-full text-center py-12 px-8 rounded-3xl border border-white/10 bg-zinc-900/50 backdrop-blur-xl shadow-2xl">
    
    <div class="mb-8 inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/5 border border-white/10">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>

    <h1 class="text-4xl font-bold mb-4 tracking-tighter uppercase italic">Order Confirmed</h1>
    <p class="text-zinc-400 mb-10 leading-relaxed">
      Your payment was successful. We are currently processing your Opalwave order. 
      Check your email for a receipt and tracking details.
    </p>

    <div class="flex flex-col gap-4">
      <a href="index.html" class="block w-full py-4 bg-white text-black font-bold uppercase tracking-widest text-xs hover:bg-zinc-200 transition-all italic">
        Return to Home
      </a>
      <p class="text-[10px] uppercase tracking-[0.2em] text-zinc-600">Opalwave Secure Transaction Complete</p>
    </div>
  </div>

</body>
</html>
