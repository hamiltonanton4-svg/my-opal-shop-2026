<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opalwave // Vault</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Secretive Overlay Styles */
    #admin-lock {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999; display: flex;
      align-items: center; justify-content: center; text-align: center;
    }
    .lock-box { background: #111; padding: 3rem; border-radius: 24px; border: 1px solid #333; }
    #admin-content { display: none; } /* Hidden by default */
    input.secret-input { 
      background: transparent; border: 1px solid #444; color: #fff; 
      padding: 1rem; border-radius: 12px; text-align: center; font-size: 1.2rem;
      outline: none; margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div id="admin-lock">
    <div class="lock-box">
      <div class="logo" style="margin-bottom: 2rem; display: block;">Opalwave Admin</div>
      <input type="password" id="adminPass" class="secret-input" placeholder="ACCESS KEY">
      <br>
      <button class="btn-primary" onclick="unlockVault()">Authenticate</button>
    </div>
  </div>

  <div id="admin-content">
    <div id="site-header"></div>

    <main class="container" style="margin-top: 5rem;">
      <section class="section-top">
        <div>
          <p class="section-label">Management</p>
          <h1>Vault Control</h1>
        </div>
      </section>

      <div class="shop-layout" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem;">
        
        <div class="hero" style="padding: 2.5rem; margin-top: 0;">
          <h2 style="margin-bottom: 2rem;">Add New Drop</h2>
          <form id="productForm" class="form-grid" style="display: flex; flex-direction: column; gap: 1rem;">
            <input id="name" type="text" placeholder="Product Name" required style="padding:1rem; border-radius:12px; border:1px solid var(--border);">
            <input id="price" type="number" step="0.01" placeholder="Price" required style="padding:1rem; border-radius:12px; border:1px solid var(--border);">
            <input id="category" type="text" placeholder="Category (Outerwear, Essentials)" required style="padding:1rem; border-radius:12px; border:1px solid var(--border);">
            <input id="image" type="url" placeholder="Image URL" required style="padding:1rem; border-radius:12px; border:1px solid var(--border);">
            
            <label style="font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem;">
              <input id="featured" type="checkbox"> Featured on Home Page
            </label>
            
            <button class="btn-primary" type="submit">Launch Product</button>
          </form>
        </div>

        <div>
          <h2 style="margin-bottom: 2rem;">Current Inventory</h2>
          <div id="admin-product-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
          <button id="resetProductsBtn" class="text-link" style="margin-top: 2rem;">Reset to Demo Data</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // 1. PASSWORD PROTECTION LOGIC
    const SECRET_KEY = "opal2026"; // CHANGE YOUR PASSWORD HERE

    function unlockVault() {
      const input = document.getElementById('adminPass').value;
      if (input === SECRET_KEY) {
        document.getElementById('admin-lock').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        renderAdminList();
      } else {
        alert("Access Denied.");
      }
    }

    // 2. ADMIN FUNCTIONALITY
    const form = document.getElementById('productForm');
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const products = getProducts();
      
      const newProduct = {
        id: Date.now().toString(), // Generates unique ID
        name: document.getElementById('name').value,
        price: parseFloat(document.getElementById('price').value),
        category: document.getElementById('category').value,
        image: document.getElementById('image').value,
        featured: document.getElementById('featured').checked
      };

      products.push(newProduct);
      localStorage.setItem(PRODUCT_STORAGE_KEY, JSON.stringify(products));
      form.reset();
      renderAdminList();
      alert("Product added to LocalStorage!");
    });

    function renderAdminList() {
      const products = getProducts();
      const list = document.getElementById('admin-product-list');
      list.innerHTML = products.map(p => `
        <div class="cart-item" style="padding: 1rem;">
          <img src="${p.image}" style="width: 50px; height: 50px; border-radius: 8px;">
          <div style="flex: 1; margin-left: 1rem;">
            <strong>${p.name}</strong><br>
            <span class="muted">${money(p.price)}</span>
          </div>
          <button onclick="deleteProduct('${p.id}')" class="btn-danger" style="margin: 0; padding: 5px;">Remove</button>
        </div>
      `).join("");
    }

    window.deleteProduct = function(id) {
      let products = getProducts();
      products = products.filter(p => p.id !== id);
      localStorage.setItem(PRODUCT_STORAGE_KEY, JSON.stringify(products));
      renderAdminList();
    }

    document.getElementById('resetProductsBtn').onclick = () => {
      localStorage.removeItem(PRODUCT_STORAGE_KEY);
      location.reload();
    };
  </script>
</body>
</html>
