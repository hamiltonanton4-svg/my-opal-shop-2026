<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart | Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="page-banner">
      <p class="section-label">Admin</p>
      <h1>Manage Products</h1>
      <p>Add products, assign categories, and manage what appears in the shop.</p>
    </section>

    <section class="admin-layout">
      <div class="card">
        <h2>Add Product</h2>

        <form id="productForm" class="form-grid">
          <div class="field">
            <label for="name">Product Name</label>
            <input id="name" type="text" required />
          </div>

          <div class="field">
            <label for="price">Price</label>
            <input id="price" type="number" step="0.01" required />
          </div>

          <div class="field">
            <label for="compareAt">Compare At Price</label>
            <input id="compareAt" type="number" step="0.01" />
          </div>

          <div class="field">
            <label for="category">Category</label>
            <input id="category" type="text" placeholder="Example: Electronics" required />
          </div>

          <div class="field">
            <label for="brand">Brand</label>
            <input id="brand" type="text" />
          </div>

          <div class="field">
            <label for="image">Image URL</label>
            <input id="image" type="url" required />
          </div>

          <div class="field field-full">
            <label for="description">Description</label>
            <textarea id="description" rows="5" required></textarea>
          </div>

          <div class="field checkbox-row">
            <label class="checkbox">
              <input id="featured" type="checkbox" />
              <span>Featured Product</span>
            </label>

            <label class="checkbox">
              <input id="inStock" type="checkbox" checked />
              <span>In Stock</span>
            </label>
          </div>

          <div class="field field-full">
            <button class="btn btn-primary" type="submit">Save Product</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="admin-top">
          <h2>Current Products</h2>
          <button class="btn btn-secondary" id="resetProductsBtn">Reset Demo Products</button>
        </div>

        <div id="admin-product-list" class="admin-list"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
