[build]
  # We only need to install the Stripe library
  command = "npm install"
  
  # This tells Netlify: "The website is right here in the main folder."
  # Do not change this to "dist" or "build"
  publish = "."

[functions]
  # This tells Netlify where your Stripe code is
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
