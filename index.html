<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opalwave | Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="hero reveal">
      <div class="hero-content">
        <span class="pill">Future-ready shopping experience</span>
        <h1>Opalwave blends luxury, speed, and futuristic design into one clean storefront.</h1>
        <p> Discover trending products, explore curated categories, and enjoy a sleek shopping experience. </p>

        <div class="hero-actions">
          <a href="shop.html" class="btn btn-primary">Explore Products</a>
          <a href="admin.html" class="btn btn-secondary">Manage Catalog</a>
        </div>
      </div>
    </section>

    <section class="section reveal">
      <div class="section-top">
        <div>
          <p class="section-label">Featured Selection</p>
          <h2>Trending Products</h2>
        </div>
        <a href="shop.html" class="text-link">Browse all</a>
      </div>
      <div class="product-grid" id="featured-products"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('buy-button')) {
        const btn = e.target;
        const originalText = btn.innerText;
        btn.innerText = "CONNECTING...";
        btn.style.opacity = "0.5";
        btn.style.pointerEvents = "none";

        try {
          const response = await fetch('/api/create-checkout', { method: 'POST' });
          const data = await response.json();
          if (data.url) { window.location.href = data.url; } 
          else { throw new Error(data.error || "Stripe Error"); }
        } catch (err) {
          alert("Error: " + err.message);
          btn.innerText = originalText;
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
        }
      }
    });
  </script>
</body>
</html>
