<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opalwave | Digital Luxury Apparel</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div id="site-header"></div>

  <main class="container">
    <section class="hero reveal">
      <div class="hero-content">
        <span class="pill">Collection No. 04 — 2026</span>
        <h1>Digital Luxury.<br>Physical Form.</h1>
        <div class="hero-actions">
          <a href="shop.html" class="btn btn-primary">Explore Drops</a>
        </div>
        <div class="hero-stats">
          <div class="stat-chip"><strong>Bespoke Quality</strong></div>
          <div class="stat-chip"><strong>Fluid Checkout</strong></div>
          <div class="stat-chip"><strong>Global Shipping</strong></div>
        </div>
      </div>
    </section>

    <section class="section reveal">
      <div class="section-top">
        <div>
          <p class="section-label">The Archive</p>
          <h2>Curated Series</h2>
        </div>
      </div>
      <div id="home-categories" class="product-grid"></div>
    </section>

    <section class="section reveal">
      <div class="section-top">
        <div>
          <p class="section-label">Seasonal Drops</p>
          <h2>Trending Now</h2>
        </div>
        <a href="shop.html" class="text-link">View All Items →</a>
      </div>
      <div id="featured-products" class="product-grid"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
