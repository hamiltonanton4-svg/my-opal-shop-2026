<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart | Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="page-banner reveal">
  <p class="section-label">Storefront</p>
  <h1>Explore the Opalwave Collection</h1>
  <p>
    Browse premium products, filter by category, search instantly, and discover
    a smoother shopping experience with a brighter futuristic feel.
  </p>
</section>

    <section class="shop-layout">
      <aside class="filters card">
        <h3>Filters</h3>

        <div class="filter-group">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="Search products..." />
        </div>

        <div class="filter-group">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sortFilter">Sort By</label>
          <select id="sortFilter">
            <option value="default">Default</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="name-asc">Name: A-Z</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="checkbox">
            <input type="checkbox" id="stockOnly" />
            <span>In Stock Only</span>
          </label>
        </div>

        <button class="btn btn-secondary full" id="resetFilters">Reset Filters</button>
      </aside>

      <section>
        <div class="shop-results-top">
          <h2>All Products</h2>
          <p id="resultsCount">0 products</p>
        </div>
        <div class="product-grid" id="shop-products"></div>
      </section>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
